<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div id="auth-screen">
    <h1>Todo List</h1>
    <div id="google-signin"></div>
    <p id="auth-error" role="alert" hidden></p>
</div>

<div id="app-screen" hidden>
    <div class="app-top">
        <h1>Todo List</h1>
        <button type="button" id="logout-btn">Log out</button>
    </div>

    <form class="input-container">
        <input id="input-todo" type="text" placeholder="write todo here">
        <button id="add-todo" type="submit">Add</button>
    </form>
    <p id="api-error" class="api-error" role="alert" hidden></p>

    <div class="todo-container"></div>
</div>

<script src="script.js"></script>
</body>
</html>
